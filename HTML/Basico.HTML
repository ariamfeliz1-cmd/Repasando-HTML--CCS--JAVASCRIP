<!DOCTYPE html>
<!-- Define que el documento es HTML5 -->

<html lang="en">
<!-- Contenedor raíz de toda la página -->

<head>
    <meta charset="UTF-8">
    <!-- Permite usar caracteres especiales como ñ o tildes -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace la página responsive en móviles -->

    <title>Mi Página Personal</title>
    <!-- Título que aparece en la pestaña -->
</head>

<body>
    <!-- Todo lo visible de la página -->

    <h1>Hola, soy Ariam</h1>
    <!-- Título principal -->

    <p>Estoy aprendiendo HTML desde cero.</p>
    <!-- Párrafo de texto -->

    <h2>Sobre mí</h2>
    <!-- Subtítulo -->

    <p>Me gusta la programación y el trading.</p>

    <h2>Mi imagen</h2>

    <img src="https://via.placeholder.com/150" alt="Imagen de ejemplo">
    <!-- Muestra una imagen -->
    <!-- src = ruta de la imagen -->
    <!-- alt = texto alternativo -->

    <h2>Mis redes</h2>

    <a href="https://google.com" target="_blank">
        Ir a Google
    </a>
    <!-- Enlace -->
    <!-- href = URL -->
    <!-- target="_blank" abre en nueva pestaña -->

</body>

</html>
