<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Multimedia</title>
</head>

<body>

    <!-- Multimedia + tablas + elementos avanzados -->

    <h1>Contenido Multimedia</h1>

    <!-- Imagen semántica -->
    <figure>
        <img src="https://via.placeholder.com/300" alt="Ejemplo">
        <figcaption>Imagen de ejemplo con descripción</figcaption>
    </figure>

    <!-- Video -->
    <video controls width="300">
        <source src="video.mp4" type="video/mp4">
        Tu navegador no soporta video
    </video>

    <!-- Audio -->
    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

    <h2>Tabla de usuarios</h2>

    <table border="1">
        <!-- Tabla estructurada -->

        <thead>
            <!-- Encabezado -->
            <tr>
                <th>Nombre</th>
                <th>Edad</th>
            </tr>
        </thead>

        <tbody>
            <!-- Contenido -->
            <tr>
                <td>Ariam</td>
                <td>22</td>
            </tr>
        </tbody>

        <tfoot>
            <!-- Pie de tabla -->
            <tr>
                <td colspan="2">Total usuarios: 1</td>
            </tr>
        </tfoot>
    </table>

    <!-- Acordeón sin JavaScript -->
    <details>
        <summary>Ver más información</summary>
        <p>Este contenido estaba oculto.</p>
    </details>

</body>
</html>
