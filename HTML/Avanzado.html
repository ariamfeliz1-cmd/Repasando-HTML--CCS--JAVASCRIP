<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Blog</title>
</head>

<body>

    <header>
        <!-- Encabezado principal del sitio -->
        <h1>Mi Blog</h1>

        <nav>
            <!-- Menú de navegación -->
            <a href="#">Inicio</a>
            <a href="#">Artículos</a>
            <a href="#">Contacto</a>
        </nav>
    </header>

    <main>
        <!-- Contenido principal -->

        <section>
            <!-- Sección de contenido -->

            <article>
                <!-- Artículo independiente -->
                <h2>Mi primer post</h2>

                <p>Publicado el <time datetime="2026-04-01">1 de abril</time></p>
                <!-- time = fecha semántica -->

                <p>Este es mi primer artículo en HTML.</p>
            </article>

            <article>
                <h2>Aprendiendo HTML</h2>
                <p>HTML es la base de toda página web.</p>
            </article>

        </section>

        <aside>
            <!-- Contenido secundario (sidebar) -->
            <h3>Sobre mí</h3>
            <p>Soy desarrollador en progreso.</p>
        </aside>

    </main>

    <footer>
        <!-- Pie de página -->
        <p>&copy; 2026 Mi Blog</p>
    </footer>

</body>

</html>
